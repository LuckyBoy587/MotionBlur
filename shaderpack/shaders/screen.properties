# Basic Motion Blur - screen.properties
# ---------------------------------------------------------
# This file defines the layout and names of the shader options screen
# inside Minecraft's shader selection settings UI (Iris / OptiFine).

# Main settings screen layout
screen.main = BLUR_STRENGTH BLUR_SAMPLES

# Label names for the options
option.BLUR_STRENGTH = Blur Strength
option.BLUR_SAMPLES = Sample Count

# Value descriptions or formatting can be defined here if needed,
# but the defaults and choices in brackets in composite.fsh are auto-detected.
value.BLUR_STRENGTH.0.001 = Ultra Mild (0.001)
value.BLUR_STRENGTH.0.002 = Very Mild (0.002)
value.BLUR_STRENGTH.0.005 = Mild (0.005)
value.BLUR_STRENGTH.0.01  = Default (0.01)
value.BLUR_STRENGTH.0.015 = Strong (0.015)
value.BLUR_STRENGTH.0.02  = Very Strong (0.02)
value.BLUR_STRENGTH.0.03  = Extreme (0.03)
value.BLUR_STRENGTH.0.05  = Heavy (0.05)
value.BLUR_STRENGTH.0.1   = Cinematic (0.1)

value.BLUR_SAMPLES.5   = Low Performance Cost (5)
value.BLUR_SAMPLES.7   = Medium-Low (7)
value.BLUR_SAMPLES.9   = Medium (9)
value.BLUR_SAMPLES.11  = Balanced (11)
value.BLUR_SAMPLES.13  = Smooth (13)
value.BLUR_SAMPLES.15  = Very Smooth (15)
value.BLUR_SAMPLES.17  = High Quality (17)
value.BLUR_SAMPLES.19  = Cinematic (19)
value.BLUR_SAMPLES.21  = Extreme (21)
