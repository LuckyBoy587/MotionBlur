name: CI and Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Validate that the shaderpack files exist in the correct structure
      - name: Validate Shaderpack Structure
        run: |
          echo "Checking for essential shader files..."
          if [ ! -f "shaderpack/shaders/composite.vsh" ]; then
            echo "Error: composite.vsh is missing!" >&2
            exit 1
          fi
          if [ ! -f "shaderpack/shaders/composite.fsh" ]; then
            echo "Error: composite.fsh is missing!" >&2
            exit 1
          fi
          if [ ! -f "shaderpack/shaders/screen.properties" ]; then
            echo "Error: screen.properties is missing!" >&2
            exit 1
          fi
          echo "All shader files validated successfully."

      # 3. Determine the archive filename and release settings based on the git reference
      - name: Set Archive Filename and Release Settings
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag format: refs/tags/v0.1.0 -> basic-motion-blur-v0.1.0.zip
            TAG_NAME="${{ github.ref_name }}"
            ZIP_NAME="basic-motion-blur-${TAG_NAME}.zip"
            RELEASE_TITLE="Release ${TAG_NAME}"
          else
            # Branch/push format: dev-abcdef1 -> basic-motion-blur-dev-abcdef1.zip
            SHA_SHORT=$(git rev-parse --short HEAD)
            TAG_NAME="dev-${SHA_SHORT}"
            ZIP_NAME="basic-motion-blur-${TAG_NAME}.zip"
            RELEASE_TITLE="Development Build ${TAG_NAME}"
          fi
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_ENV
          echo "RELEASE_TITLE=${RELEASE_TITLE}" >> $GITHUB_ENV

      # 4. Package the shader pack contents into a zip archive
      #    Note: We must zip the contents of 'shaderpack/' (i.e. the 'shaders' folder)
      #    directly so the zip root has the correct layout for Minecraft.
      - name: Package Shaderpack
        run: |
          cd shaderpack
          zip -r "../${{ env.ZIP_NAME }}" .
          cd ..
          echo "Created archive: ${{ env.ZIP_NAME }}"

      # 5. Upload the generated zip file as a workflow artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

      # 6. Create a GitHub Release and attach the zip archive (runs on pushes/dispatches, not pull requests)
      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Publishing GitHub Release for tag/branch push: ${{ env.TAG_NAME }}"
          gh release create "${{ env.TAG_NAME }}" "${{ env.ZIP_NAME }}" \
            --title "${{ env.RELEASE_TITLE }}" \
            --generate-notes
